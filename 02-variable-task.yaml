# using variables in the ansible 
- name: variables from play level 
  hosts: "localhost" 
  vars: 
    Course: "Devops"
    Training: "join-devops"
    Trainer: "Sivakumar" 
  tasks:
  - name: check variable 
    vars:
      Trainer: "Rajesh"
    ansible.builtin.debug:
      msg: "hi iam learnig {{ Course }} from {{ Training }} trainer is {{ Trainer  }}" 
